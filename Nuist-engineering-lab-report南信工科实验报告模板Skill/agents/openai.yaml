interface:
  display_name: "工科实验报告"
  short_description: "根据实验材料自动生成接近提交成品的实验报告，支持继承学校模板并直接输出 DOCX。"
  default_prompt: "Use $engineering-lab-report to generate a Chinese engineering lab report from my experiment instructions, screenshots, result charts, notes, and school template, keep the writing evidence-based and natural, place figures near the text they support, and output a DOCX file that closely matches the template when a finished Word report is needed."
